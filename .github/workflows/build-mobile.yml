name: Build Mobile Apps (Android & iOS)
on:
  push:
    branches: [ main ]

jobs:
  android-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run build
      - run: npx cap sync android
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: Rased-Student-Android-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk

  ios-build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          
      - name: Install Dependencies
        run: |
          npm install
          # 🚨 السر هنا: إجبار السيرفر على تحميل أدوات آبل لكاباسيتور
          npm install @capacitor/core @capacitor/ios
          
      - name: Build Web Project
        run: npm run build
        
      - name: 🍏 Generate iOS Project
        run: |
          rm -rf ios
          npx cap add ios
          npx cap sync ios
          
      - name: 📦 Create Podfile & Install (The Nuclear Option)
        run: |
          cd ios/App
          
          # 🪄 الحيلة السحرية: إذا لم يجد الملف، سيكتبه السيرفر بنفسه!
          if [ ! -f Podfile ]; then
            echo "⚠️ Podfile is missing! Generating forcefully..."
            cat <<EOF > Podfile
          require_relative '../../node_modules/@capacitor/ios/scripts/pods_helpers'
          platform :ios, '13.0'
          use_frameworks!
          def capacitor_pods
            capacitor_cordova_ios_plugins
          end
          target 'App' do
            capacitor_pods
          end
          EOF
          fi
          
          # الآن نثبت المكتبات (وسينجح غصباً عنه)
          pod install
          
      - name: 🚀 Build IPA
        run: |
          cd ios/App
          # بناء التطبيق
          xcodebuild -workspace App.xcworkspace -scheme App -configuration Debug -sdk iphoneos CODE_SIGNING_ALLOWED=NO build
          
          # تحويله إلى صيغة IPA
          mkdir -p Payload
          cp -r build/Debug-iphoneos/App.app Payload/
          zip -r ../../Rased-Student.ipa Payload
          
      - name: Upload iOS IPA
        uses: actions/upload-artifact@v4
        with:
          name: Rased-Student-iOS-IPA
          path: Rased-Student.ipa
