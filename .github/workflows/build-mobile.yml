name: Build Mobile Apps (Android & iOS)
on:
  push:
    branches: [ main ]

jobs:
  android-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run build
      - run: npx cap sync android
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: Rased-Student-Android-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk

  ios-build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies & Build Web Project
        run: |
          npm install
          npm run build

      - name: 🍏 Copy Web Assets to iOS (SPM Mode - No Podfile)
        run: npx cap copy ios

      - name: 🚀 Build IPA
        run: |
          cd ios/App
          xcodebuild -project App.xcodeproj -scheme App -configuration Debug -sdk iphoneos CODE_SIGNING_ALLOWED=NO SYMROOT=$PWD/build build
          
          mkdir -p Payload
          cp -r build/Debug-iphoneos/App.app Payload/
          zip -r ../../Rased-Student.ipa Payload

      - name: Upload iOS IPA
        uses: actions/upload-artifact@v4
        with:
          name: Rased-Student-iOS-IPA
          path: Rased-Student.ipa

      - name: Upload iOS IPA
        uses: actions/upload-artifact@v4
        with:
          name: Rased-Student-iOS-IPA
          path: Rased-Student.ipa
