name: Build Mobile Apps (Android & iOS)
on:
  push:
    branches: [ main ]

jobs:
  android-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run build
      - run: npx cap sync android
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: Rased-Student-Android-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk

  ios-build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          
      - name: Install Dependencies
        run: npm install
        
      - name: Build Web Project
        run: npm run build
        
      - name: 🍏 Generate iOS Project from Scratch
        run: |
          # حذف المجلد الناقص الذي تم رفعه من ويندوز
          rm -rf ios
          
          # إنشاء مجلد iOS جديد ونظيف (سيقوم بتوليد الـ Podfile تلقائياً)
          npx cap add ios
          
          # مزامنة ملفات الويب
          npx cap sync ios
          
      - name: 🚀 Build IPA
        run: |
          # الدخول للمجلد الذي أنشأه السيرفر الآن
          cd ios/App
          
          # بناء التطبيق (سيجد الـ Podfile والـ Workspace الآن)
          xcodebuild -workspace App.xcworkspace -scheme App -configuration Debug -sdk iphoneos CODE_SIGNING_ALLOWED=NO build
          
          # تحويله إلى صيغة IPA
          mkdir -p Payload
          cp -r build/Debug-iphoneos/App.app Payload/
          zip -r ../../Rased-Student.ipa Payload
          
      - name: Upload iOS IPA
        uses: actions/upload-artifact@v4
        with:
          name: Rased-Student-iOS-IPA
          path: Rased-Student.ipa
