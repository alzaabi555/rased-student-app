name: Build Mobile Apps (Android & iOS)
on:
  push:
    branches: [ main ]

jobs:
  android-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'
          
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      
      - name: Install Dependencies
        run: npm install
        
      - name: Build Web Project
        run: npm run build
        
      - name: Sync Android
        run: npx cap sync android
        
      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
          
      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: Rased-Student-Android-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk

 ios-build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          
      - name: Install Dependencies
        run: npm install
        
      - name: Build Web Project
        run: npm run build
        
      - name: Force Initialize iOS Project
        run: |
          # 1. تنظيف شامل
          rm -rf ios
          # 2. تثبيت المنصة
          npx cap add ios
          # 3. مزامنة الملفات
          npx cap sync ios
          
      - name: Build IPA (Manual Navigation)
        run: |
          # ننتقل للمسار القياسي الذي ينشئه كاباسيتور
          cd ios/App
          
          # تثبيت المكتبات (Pods) يدوياً للتأكد من وجود الـ Workspace
          pod install
          
          # التأكد من وجود الملف قبل البدء
          if [ ! -d "App.xcworkspace" ]; then
            echo "❌ Error: App.xcworkspace still not found!"
            exit 1
          fi
          
          echo "🚀 Building Xcode Workspace..."
          xcodebuild -workspace App.xcworkspace -scheme App -configuration Debug -sdk iphoneos CODE_SIGNING_ALLOWED=NO build
          
          # تجميع الـ IPA
          mkdir -p Payload
          cp -r build/Debug-iphoneos/App.app Payload/
          zip -r Rased-Student.ipa Payload
          
          # نقل الملف للمجلد الرئيسي لرفعه
          mv Rased-Student.ipa ../../
          
      - name: Upload iOS IPA
        uses: actions/upload-artifact@v4
        with:
          name: Rased-Student-iOS-IPA
          path: Rased-Student.ipa
