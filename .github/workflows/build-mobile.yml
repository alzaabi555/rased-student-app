name: Build Mobile Apps (Android & iOS)
on:
  push:
    branches: [ main ]

jobs:
  android-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'
          
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      
      - name: Install Dependencies
        run: npm install
        
      - name: Build Web Project
        run: npm run build
        
      - name: Sync Android
        run: npx cap sync android
        
      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
          
      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: Rased-Student-Android-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk

  ios-build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          
      - name: Install Dependencies
        run: npm install
        
      - name: Build Web Project
        run: npm run build
        
      - name: Initialize iOS Project from Scratch
        run: |
          # 1. حذف أي مجلد ios قديم لضمان النظافة
          rm -rf ios
          
          # 2. إضافة منصة iOS بشكل نظيف (سيقوم بتوليد الـ Podfile تلقائياً)
          npx cap add ios
          
          # 3. مزامنة الملفات
          npx cap sync ios
          
      - name: Build IPA (Unsigned)
        run: |
          # الدخول للمجلد الذي أنشأه Capacitor تلقائياً
          cd ios/App
          
          # بناء التطبيق (هنا سيجد كل الملفات المطلوبة)
          xcodebuild -workspace App.xcworkspace -scheme App -configuration Debug -sdk iphoneos CODE_SIGNING_ALLOWED=NO build
          
          # تجميع ملف الـ IPA
          mkdir -p Payload
          cp -r build/Debug-iphoneos/App.app Payload/
          zip -r Rased-Student.ipa Payload
          
      - name: Upload iOS IPA
        uses: actions/upload-artifact@v4
        with:
          name: Rased-Student-iOS-IPA
          path: ios/App/Rased-Student.ipaApp.ipa
