name: Build Mobile Apps (Android & iOS)
on:
  push:
    branches: [ main ] # سيتم البناء في كل مرة ترفع فيها للكود

jobs:
  # --- مهمة بناء الأندرويد ---
  android-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 18
      
      - name: Install Dependencies
        run: npm install
        
      - name: Build Web Project
        run: npm run build
        
      - name: Sync Android
        run: npx cap sync android
        
      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
          
      - name: Upload Android APK
       uses: actions/upload-artifact@v4
        with:
          name: Rased-Student-Android-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk

  # --- مهمة بناء الآيفون ---
  ios-build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 18
          
      - name: Install Dependencies
        run: npm install
        
      - name: Build Web Project
        run: npm run build
        
      - name: Sync iOS
        run: npx cap sync ios
        
      - name: Build IPA (Unsigned)
        run: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace -scheme App -sdk iphoneos -configuration Debug -allowProvisioningUpdates build
          mkdir -p Payload
          cp -r build/Debug-iphoneos/App.app Payload/
          zip -r App.ipa Payload
          
      - name: Upload iOS IPA
      uses: actions/upload-artifact@v4
        with:
          name: Rased-Student-iOS-IPA
          path: ios/App/App.ipa
