name: Build Mobile Apps (Android & iOS)
on:
  push:
    branches: [ main ]

jobs:
  android-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run build
      - run: npx cap sync android
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: Rased-Student-Android-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk

  ios-build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          
      - name: Install Dependencies
        run: npm install
        
      - name: Build Web Project
        run: npm run build
        
      - name: 🍏 Generate iOS Project
        run: |
          rm -rf ios
          npx cap add ios
          npx cap sync ios
          
      - name: 📦 Hardcode Podfile & Install (The Absolute Fix)
        run: |
          cd ios/App
          
          echo "⚠️ Writing explicit Podfile for Rased Student..."
          # سنكتب المسارات المباشرة للمكتبات الموجودة في package.json الخاص بك
          cat <<EOF > Podfile
          platform :ios, '15.0'
          use_frameworks!

          target 'App' do
            pod 'Capacitor', :path => '../../node_modules/@capacitor/ios'
            pod 'CapacitorCordova', :path => '../../node_modules/@capacitor/ios'
            pod 'CapacitorLocalNotifications', :path => '../../node_modules/@capacitor/local-notifications'
          end
          EOF
          
          # الآن سيتم تثبيت المكتبات بنجاح 100%
          pod install
          
      - name: 🚀 Build IPA
        run: |
          cd ios/App
          # بناء التطبيق
          xcodebuild -workspace App.xcworkspace -scheme App -configuration Debug -sdk iphoneos CODE_SIGNING_ALLOWED=NO build
          
          # تحويله إلى صيغة IPA
          mkdir -p Payload
          cp -r build/Debug-iphoneos/App.app Payload/
          zip -r ../../Rased-Student.ipa Payload
          
      - name: Upload iOS IPA
        uses: actions/upload-artifact@v4
        with:
          name: Rased-Student-iOS-IPA
          path: Rased-Student.ipa
