name: Build Mobile Apps (Huawei Release APK & iOS)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  android-build-huawei:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm install

      - name: Build Web Assets
        run: npm run build

      - name: Sync Android Platform
        run: |
          echo "Checking Android platform..."
          if [ ! -d "android" ]; then
            npx cap add android
          fi
          npx cap sync android

      - name: 🚀 Build Android Release APK (For Huawei)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --stacktrace

      - name: 🔐 Sign APK
        uses: r0adkll/sign-android-release@v1
        id: sign_apk
        with:
          releaseDirectory: android/app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "35.0.0"

      - name: 📥 Upload Signed APK
        uses: actions/upload-artifact@v4
        with:
          name: Rased-Student-Huawei-Release-APK
          path: ${{steps.sign_apk.outputs.signedReleaseFile}}

  ios-build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies & Build Web Project
        run: |
          npm install
          npm run build

      - name: 🍏 Create Fresh iOS Project
        run: |
          rm -rf ios
          npx cap add ios

      - name: 🎨 Generate App Icons Automatically
        run: npx @capacitor/assets generate --ios || true

      - name: ✍️ Set Arabic App Name (Smart Injection)
        run: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName راصد نسخة الطلبة" ios/App/App/Info.plist || true
          /usr/libexec/PlistBuddy -c "Set :CFBundleName راصد نسخة الطلبة" ios/App/App/Info.plist || true

      - name: 🚀 Build IPA
        run: |
          cd ios/App
          xcodebuild -project App.xcodeproj -scheme App -configuration Debug -sdk iphoneos CODE_SIGNING_ALLOWED=NO SYMROOT=$PWD/build build
          
          mkdir -p Payload
          cp -r build/Debug-iphoneos/App.app Payload/
          zip -r ../../Rased-Student.ipa Payload

      - name: Upload iOS IPA
        uses: actions/upload-artifact@v4
        with:
          name: Rased-Student-iOS-IPA
          path: Rased-Student.ipa
