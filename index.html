<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
  <link rel="apple-touch-icon" href="./apple-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="راصد الطالب" />
    
    <link rel="apple-touch-icon" href="/apple-icon.png" />
    
    <title>راصد - نسخة الطالب</title>

    <style>
      /* 🪄 منع ظهور اللون الأبيض تماماً عند تشغيل التطبيق */
      html, body {
        background-color: #020617; /* لون السماء العميقة */
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
        overflow: hidden;
        -webkit-user-select: none;
        user-select: none;
        /* منع ظهور قائمة السياق عند اللمس الطويل */
        -webkit-touch-callout: none;
      }

      /* 🌫️ تخصيص السكرول بار ليصبح شفافاً وزجاجياً على الويب والويندوز */
      ::-webkit-scrollbar {
        width: 5px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(99, 102, 241, 0.2);
        border-radius: 10px;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
