<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />

    <link rel="apple-touch-icon" href="./apple-icon.png" />

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />

    <!-- لون شريط المتصفح / الهاتف مطابق للثيم الفاتح -->
    <meta name="theme-color" content="#F8FAFC" />

    <!-- إعدادات تطبيق الويب على iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes" />

    <!-- بدل black-translucent حتى لا يظهر الشريط داكنًا -->
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />

    <meta name="apple-mobile-web-app-title" content="راصد الطالب" />

    <link rel="apple-touch-icon" href="/apple-icon.png" />

    <title>راصد - نسخة الطالب</title>

    <style>
      /*
        ☀️ خلفية ابتدائية فاتحة قبل تحميل React
        تمنع ظهور فلاش داكن عند تشغيل التطبيق
      */
      html,
      body {
        background-color: #f8fafc;
        color: #0f172a;
        margin: 0;
        padding: 0;
        min-height: 100%;
        width: 100%;
        overflow: hidden;
        -webkit-user-select: none;
        user-select: none;
        -webkit-touch-callout: none;
      }

      #root {
        min-height: 100dvh;
        background-color: #f8fafc;
        color: #0f172a;
      }

      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }

      ::-webkit-scrollbar-track {
        background: transparent;
      }

      ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 999px;
      }

      ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8;
      }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
